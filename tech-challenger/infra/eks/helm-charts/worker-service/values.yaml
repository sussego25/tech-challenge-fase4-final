nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: 325066546876.dkr.ecr.us-east-1.amazonaws.com/worker-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "worker-service"
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::325066546876:role/tech-challenger-worker-service-role-prod"

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: prod
  SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/325066546876/tech-challenger-architecture-analysis-queue-prod"
  SNS_TOPIC_ARN: "arn:aws:sns:us-east-1:325066546876:tech-challenger-analysis-results-prod"
  S3_BUCKET: "tech-challenger-diagrams-prod-325066546876"
  DYNAMODB_TABLE: "tech-challenger-diagrams-prod"
  YOLO_SAGEMAKER_ENDPOINT: "tech-challenger-yolo-prod"
  LLM_PROVIDER: "bedrock"
  SAGEMAKER_ENDPOINT: ""
  BEDROCK_MODEL_ID: "amazon.nova-lite-v1:0"

existingSecretName: ""
secretEnv: []
# Exemplo:
# secretEnv:
#   - name: SMTP_PASSWORD
#     key: smtp_password

worker:
  command: []
  args: []
  # Exemplo:
  # command: ["python"]
  # args: ["-m", "src.main"]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

